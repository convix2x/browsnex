<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="/icon.png">
  <title>Browsnex</title>
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #toolbar {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 4px 6px;
      gap: 5px;
    }

    #url-input {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      font-size: 16px;
    }

    #go-btn, #kbd-btn {
      font-size: 16px;
      font-weight: bold;
    }

    #stream {
      display: block;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <input
      type="url"
      id="url-input"
      placeholder="https://..."
      autocorrect="off"
      autocapitalize="none"
      autocomplete="off"
      spellcheck="false"
    >
    <button id="go-btn" type="button">Go</button>
    <button id="kbd-btn" type="button">⌨️</button>
  </div>

  <img id="stream" src="" alt="">
  <input id="kbd" type="text" style="position:fixed;left:0;top:0;width:100%;height:100%;opacity:0;z-index:-1;" autocorrect="off" autocapitalize="none" autocomplete="off" spellcheck="false">

<script>
(function () {

  var W       = window.screen.width;
  var input   = document.getElementById("url-input");
  var goBtn   = document.getElementById("go-btn");
  var kbdBtn  = document.getElementById("kbd-btn");
  var stream  = document.getElementById("stream");
  var toolbar = document.getElementById("toolbar");
  var kbd     = document.getElementById("kbd");
  var kbdVal  = "";

  var params  = (function () {
    var q = {}, s = window.location.search.slice(1).split("&");
    for (var i = 0; i < s.length; i++) {
      var p = s[i].split("=");
      if (p[0]) q[decodeURIComponent(p[0])] = decodeURIComponent(p[1] || "");
    }
    return q;
  }());

  var currentUrl = params.url || "https://earth.nullschool.net";
  input.value = currentUrl;

  function layoutStream() {
    var tbRect = toolbar.getBoundingClientRect();
    stream.style.top = tbRect.bottom + "px";
  }

  layoutStream();
  window.onresize = layoutStream;

  function startStream() {
    var tbRect  = toolbar.getBoundingClientRect();
    var streamH = window.innerHeight - tbRect.bottom;
    stream.src = "/stream"
      + "?url=" + encodeURIComponent(currentUrl)
      + "&w="   + W
      + "&h="   + Math.round(streamH);
  }

  function navigate(url) {
    if (!url) return;
    if (url.indexOf("://") === -1) url = "https://" + url;
    window.location.href = "/?url=" + encodeURIComponent(url);
  }

  goBtn.onclick = function () { navigate(input.value.trim()); };

  input.onkeydown = function (e) {
    if ((e.keyCode || e.which) === 13) navigate(input.value.trim());
  };

  kbdBtn.onclick = function () {
    kbdVal = "";
    kbd.value = "";
    kbd.focus();
  };

  function post(endpoint, data) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", endpoint, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify(data));
  }

  var metaTimer = null;

  function pollMeta() {
    if (metaTimer) clearTimeout(metaTimer);
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/meta?url=" + encodeURIComponent(currentUrl), true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4 && xhr.status === 200) {
        try {
          var d = eval("(" + xhr.responseText + ")");
          if (d.title) document.title = d.title + " \u2014 Browsnex";
          if (d.driftUrl) {
            window.location.href = "/?url=" + encodeURIComponent(d.driftUrl);
            return;
          }
        } catch (e) {}
        metaTimer = setTimeout(pollMeta, 1500);
      }
    };
    xhr.onerror = function () { metaTimer = setTimeout(pollMeta, 3000); };
    xhr.send();
  }

  var touchStartX = 0;
  var touchStartY = 0;
  var lastScroll  = 0;
  var SCROLL_MS   = 30;

  function streamCoords(clientX, clientY) {
    var r  = stream.getBoundingClientRect();
    var sc = W / r.width;
    return {
      x: Math.round((clientX - r.left) * sc),
      y: Math.round((clientY - r.top)  * sc)
    };
  }

  stream.addEventListener("touchstart", function (e) {
    e.preventDefault();
    var t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, false);

  stream.addEventListener("touchmove", function (e) {
    e.preventDefault();
    var now = Date.now();
    if (now - lastScroll < SCROLL_MS) return;
    lastScroll = now;
    var t  = e.touches[0];
    var r  = stream.getBoundingClientRect();
    var sc = W / r.width;
    post("/input/scroll", {
      url: currentUrl,
      dx: (touchStartX - t.clientX) * sc,
      dy: (touchStartY - t.clientY) * sc
    });
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, false);

  stream.addEventListener("touchend", function (e) {
    e.preventDefault();
    var t  = e.changedTouches[0];
    var dx = Math.abs(t.clientX - touchStartX);
    var dy = Math.abs(t.clientY - touchStartY);
    if (dx < 10 && dy < 10) {
      var c = streamCoords(t.clientX, t.clientY);
      post("/input/tap", { url: currentUrl, x: c.x, y: c.y });
    }
  }, false);

  kbd.oninput = function () {
    var next = kbd.value;
    if (next.length > kbdVal.length) {
      post("/input/type", { url: currentUrl, text: next.slice(kbdVal.length) });
    }
    kbdVal = next;
  };

  kbd.onkeydown = function (e) {
    var code = e.keyCode || e.which;
    if (code === 8)  post("/input/key", { url: currentUrl, key: "Backspace" });
    if (code === 13) post("/input/key", { url: currentUrl, key: "Enter" });
    if (code === 37) post("/input/key", { url: currentUrl, key: "ArrowLeft" });
    if (code === 38) post("/input/key", { url: currentUrl, key: "ArrowUp" });
    if (code === 39) post("/input/key", { url: currentUrl, key: "ArrowRight" });
    if (code === 40) post("/input/key", { url: currentUrl, key: "ArrowDown" });
  };

  startStream();
  pollMeta();

}());
</script>

</body>
</html>
