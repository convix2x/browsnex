<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="/icon.png">
  <title>Browsnex</title>
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #toolbar {
      display: block;
      padding: 5px 6px;
      white-space: nowrap;
      background: #384963;
      background: -webkit-gradient(linear, left top, left bottom, from(#587397), to(#384963));
    }

    #url-input {
      display: inline-block;
      width: 120px;
      min-width: 0;
      font-size: 14px;
      height: 30px;
      border-radius: 8px;
      padding: 0 8px;
      vertical-align: middle;
    }

    #go-btn {
      display: inline-block;
      background-image: url('/button.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-color: transparent;
      border: none;
      height: 30px;
      width: 40px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      padding: 0;
      line-height: 30px;
      text-align: center;
      vertical-align: middle;
      margin-left: 4px;
    }

    #kbd-btn, #menu-btn {
      display: inline-block;
      background-image: url('/buttoncircle.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-color: transparent;
      border: none;
      width: 24px;
      height: 24px;
      font-size: 15px;
      color: #fff;
      padding: 0;
      line-height: 24px;
      text-align: center;
      white-space: nowrap;
      vertical-align: middle;
      margin-left: 4px;
    }

    #menu {
      display: none;
      position: absolute;
      right: 4px;
      background: #fff;
      border: 1px solid #999;
      z-index: 100;
      -webkit-box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    #menu button {
      display: block;
      width: 100%;
      padding: 10px 18px;
      font-size: 15px;
      text-align: left;
      border: none;
      border-bottom: 1px solid #ddd;
      background: transparent;
    }

    #scrollbar-track {
      display: block !important;
      position: fixed;
      right: 0;
      top: 34px;
      width: 20px;
      bottom: 0;
      overflow-y: scroll;
      overflow-x: hidden;
      z-index: 9999;
      background: rgba(255,0,0,0.25);
    }

    #scrollbar-thumb {
      width: 20px;
      min-height: 2000px;
      background: #fff;
    }

    #stream {
      display: block;
      position: absolute;
      left: 0;
      top: 35px;
      width: 300px;
      height: 180px;
      object-fit: contain;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      cursor: default;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <input
      type="url"
      id="url-input"
      placeholder="https://..."
      autocorrect="off"
      autocapitalize="none"
      autocomplete="off"
      spellcheck="false"
    >
    <button id="go-btn" type="button">Go</button>
    <button id="kbd-btn" type="button">⌨️</button>
    <button id="enter-btn">↵</button>
    <button id="send-kbd-btn" type="button">Send</button>
    <button id="scroll-up-btn" type="button">▲</button>
    <button id="scroll-down-btn" type="button">▼</button> 
    <button id="menu-btn" type="button">☰</button>
  </div>

  <div id="menu">
    <button id="back-btn" type="button">Back</button>
    <button id="fwd-btn" type="button">Forward</button>
    <button id="reload-btn" type="button">Reload</button>
    <button id="home-btn" type="button">Home</button>
    <select id="quality-select" style="display:block;width:100%;padding:10px 18px;font-size:15px;border:none;border-top:1px solid #ddd;background:transparent;">
      <option value="auto">Quality: Auto</option>
      <option value="low">Quality: Low</option>
      <option value="medium">Quality: Medium</option>
      <option value="high">Quality: High</option>
    </select>
  </div>

  <img id="stream" src="" alt="">
  <div id="scrollbar-track"><div id="scrollbar-thumb"></div></div>
  <input id="kbd" type="text" style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;" autocorrect="off" autocapitalize="none" autocomplete="off" spellcheck="false">

<script>
(function () {

  var uaString = navigator.userAgent || "";
  var is3DS = /Nintendo|3DS/i.test(uaString);
  var isTouch = is3DS;
  console.log("isTouch =", isTouch);
  console.log(
    "ontouchstart:",
    ('ontouchstart' in window),
    "maxTouchPoints:",
    navigator.maxTouchPoints
  );
  var W       = 640;
  var H       = 360;

  var input     = document.getElementById("url-input");
  var goBtn     = document.getElementById("go-btn");
  var kbdBtn    = document.getElementById("kbd-btn");
  var menuBtn   = document.getElementById("menu-btn");
  var menu      = document.getElementById("menu");
  var backBtn   = document.getElementById("back-btn");
  var fwdBtn    = document.getElementById("fwd-btn");
  var reloadBtn    = document.getElementById("reload-btn");
  var scrollUpBtn = document.getElementById("scroll-up-btn");
  var scrollDownBtn = document.getElementById("scroll-down-btn");
  var homeBtn      = document.getElementById("home-btn");
  var enterBtn = document.getElementById("enter-btn");
  var sendKbdBtn = document.getElementById("send-kbd-btn");
  var qualitySelect = document.getElementById("quality-select");
  var stream    = document.getElementById("stream");
  var toolbar   = document.getElementById("toolbar");
  var kbd       = document.getElementById("kbd");
  var sbTrack   = document.getElementById("scrollbar-track");
  var sbThumb   = document.getElementById("scrollbar-thumb");
  var kbdVal    = "";
  var menuOpen  = false;
  var sbScrolling = false;
  var sbTimer     = null;
  var sbOnScroll  = null;

  function makeXHR() {
    if (window.XMLHttpRequest) return new XMLHttpRequest();
    if (window.ActiveXObject) return new ActiveXObject("Microsoft.XMLHTTP");
    return null;
  }

  function clientUA() {
    var p = navigator.platform || "";
    var ua = navigator.userAgent || "";
    if (isTouch) return "mobile";
    if (p.indexOf("Win") !== -1) {
      if (ua.indexOf("Windows NT 10") !== -1) return "Windows NT 10.0";
      if (ua.indexOf("Windows NT 6.1") !== -1) return "Windows NT 6.1";
      if (ua.indexOf("Windows NT 6") !== -1)   return "Windows NT 6.0";
      if (ua.indexOf("Windows NT 5.1") !== -1) return "Windows NT 5.1";
      return "Windows 98";
    }
    if (p.indexOf("Mac") !== -1) return "Macintosh";
    if (p.indexOf("Linux") !== -1) return "X11; Linux x86_64";
    return "Windows 98";
  }

  var cid = (function () {
    var stored = window.sessionStorage && sessionStorage.getItem("browsnex_cid");
    if (stored) return stored;
    var id = "c" + Math.random().toString(36).slice(2, 10);
    try { sessionStorage.setItem("browsnex_cid", id); } catch (_) {}
    return id;
  }());

  var params = (function () {
    var q = {}, s = window.location.search.slice(1).split("&");
    for (var i = 0; i < s.length; i++) {
      var p = s[i].split("=");
      if (p[0]) q[decodeURIComponent(p[0])] = decodeURIComponent(p[1] || "");
    }
    return q;
  }());

  var currentUrl = params.url || "https://earth.nullschool.net";
  input.value = currentUrl;

  if (!isTouch) {
    kbdBtn.style.display = "none";
    sbTrack.style.display = "block";

    var lastSbTop = 0;

    sbOnScroll = function () {
      if (sbTimer) clearTimeout(sbTimer);
      sbScrolling = true;
      var delta = sbTrack.scrollTop - lastSbTop;
      lastSbTop = sbTrack.scrollTop;
      if (delta !== 0) {
        post("/input/scroll", { cid: cid, dx: 0, dy: delta * 4 });
      }
      sbTimer = setTimeout(function () { sbScrolling = false; }, 500);
    };

    sbTrack.onscroll = sbOnScroll;
  }

  sbTrack.onclick = function (e) {
    var r = sbTrack.getBoundingClientRect();
    var y = e.clientY - r.top;

    if (y < r.height / 2) {
      post("/input/scroll", { cid: cid, dx: 0, dy: -300 });
    } else {
      post("/input/scroll", { cid: cid, dx: 0, dy: 300 });
    }

    return false;
  };

  sbTrack.ontouchend = function (e) {
    e.preventDefault();

    var t = e.changedTouches[0];
    var r = sbTrack.getBoundingClientRect();
    var y = t.clientY - r.top;

    if (y < r.height / 2) {
      post("/input/scroll", { cid: cid, dx: 0, dy: -300 });
    } else {
      post("/input/scroll", { cid: cid, dx: 0, dy: 300 });
    }

    return false;
  };

  var sbTouchY = 0;

  sbTrack.ontouchstart = function (e) {
    var t = e.touches[0];
    sbTouchY = t.clientY;
  };

  sbTrack.ontouchmove = function (e) {
    e.preventDefault();

    var t = e.touches[0];
    var dy = t.clientY - sbTouchY;
    sbTouchY = t.clientY;

    post("/input/scroll", {
      cid: cid,
      dx: 0,
      dy: dy * 6
    });

    return false;
  };

  function layoutStream() {
    var tbRect = toolbar.getBoundingClientRect();
    var top = tbRect.bottom;
    stream.style.top = top + "px";
    menu.style.top = top + "px";
    if (!isTouch) {
      sbTrack.style.top = top + "px";
      sbTrack.style.height = (window.innerHeight - top) + "px";
    }
  }

  layoutStream();
  window.onresize = function () {
    W = 320;
    H = 180;
    layoutStream();
  };

  function toggleMenu() {
    menuOpen = !menuOpen;
    menu.style.display = menuOpen ? "block" : "none";
  }

  function closeMenu() {
    menuOpen = false;
    menu.style.display = "none";
  }

  function post(endpoint, data) {
    var xhr = makeXHR();
    if (!xhr) return;
    xhr.open("POST", endpoint, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify(data));
  }

  var screenTimer = null;

  function startStream(url) {
    if (screenTimer) clearInterval(screenTimer);

    function refresh() {
      stream.src = "/screen.jpg"
        + "?url=" + encodeURIComponent(url)
        + "&cid=" + cid
        + "&ua=" + encodeURIComponent(clientUA())
        + "&w=320"
        + "&h=180"
        + "&t=" + Date.now();
    }

    refresh();
    screenTimer = setInterval(refresh, 400);
  }

  function navigate(url) {
    if (!url) return;
    if (url.indexOf("://") === -1) url = "https://" + url;
    currentUrl = url;
    input.value = url;
    input.blur();
    closeMenu();
    if (window.history && window.history.pushState) {
      window.history.pushState(null, "", "/?url=" + encodeURIComponent(url));
    }
    startStream(url);
  }

  goBtn.onclick = function () { navigate(input.value.trim()); };

  input.onkeydown = function (e) {
    if ((e.keyCode || e.which) === 13) navigate(input.value.trim());
  };

  kbdBtn.onclick = function () {
    kbdVal = "";
    kbd.value = "";
    kbd.style.position = "absolute";
    kbd.style.left = "5px";
    kbd.style.top = "45px";
    kbd.style.width = "180px";
    kbd.style.height = "25px";
    kbd.style.opacity = "1";
    kbd.style.zIndex = "999";
    kbd.focus();
  };

  enterBtn.onclick = function () {
    post("/input/key", {
      cid: cid,
      key: "Enter"
    });
  };

  sendKbdBtn.onclick = function () {
    post("/input/type", {
      cid: cid,
      text: kbd.value
    });

    kbd.value = "";
  };

  function scrollRemote(dy) {
    post("/input/scroll", {
      cid: cid,
      dx: 0,
      dy: dy
    });
  }

  scrollUpBtn.onclick = function () {
    scrollRemote(-350);
  };

  scrollDownBtn.onclick = function () {
    scrollRemote(350);
  };

  scrollUpBtn.ontouchend = function (e) {
    e.preventDefault();
    scrollRemote(-350);
  };

  scrollDownBtn.ontouchend = function (e) {
    e.preventDefault();
    scrollRemote(350);
  };

  menuBtn.onclick = function () { toggleMenu(); };
  backBtn.onclick    = function () { post("/input/back",    { cid: cid }); closeMenu(); };
  fwdBtn.onclick     = function () { post("/input/forward", { cid: cid }); closeMenu(); };
  reloadBtn.onclick  = function () { post("/input/reload",  { cid: cid }); closeMenu(); };
  homeBtn.onclick    = function () { window.location.href = "/"; };

  qualitySelect.onchange = function () {
    post("/quality", { cid: cid, preset: qualitySelect.value });
  };

  var metaTimer = null;

  function pollMeta(fast) {
    if (metaTimer) clearTimeout(metaTimer);
    var metaXhr = makeXHR();
    if (!metaXhr) return;
    metaXhr.open("GET", "/meta?cid=" + cid, true);
    metaXhr.onreadystatechange = function () {
      if (metaXhr.readyState === 4 && metaXhr.status === 200) {
        try {
          var d = eval("(" + metaXhr.responseText + ")");
          if (d.title) document.title = d.title + " \u2014 Browsnex";
          if (d.driftUrl) {
            currentUrl = d.driftUrl;
            input.value = d.driftUrl;
            if (window.history && window.history.pushState) {
              window.history.pushState(null, "", "/?url=" + encodeURIComponent(d.driftUrl));
            }
            startStream(d.driftUrl);
            metaTimer = setTimeout(function () { pollMeta(false); }, 1500);
            return;
          }
        } catch (e) {}
        if (!isTouch) {
          var siXhr = makeXHR();
          if (siXhr) {
            siXhr.open("GET", "/scrollinfo?cid=" + cid, true);
            siXhr.onreadystatechange = function () {
              if (siXhr.readyState === 4 && siXhr.status === 200) {
                try {
                  var info = eval("(" + siXhr.responseText + ")");
                  sbThumb.style.height = info.scrollHeight + "px";
                  if (!sbScrolling) {
                    var total = info.scrollHeight - info.innerHeight;
                    if (total > 0) {
                      var pct = info.scrollY / total;
                      var trackScrollable = sbTrack.scrollHeight - sbTrack.clientHeight;
                      sbTrack.onscroll = null;
                      sbTrack.scrollTop = pct * trackScrollable;
                      sbTrack.onscroll = sbOnScroll;
                    }
                  }
                } catch (_) {}
              }
            };
            siXhr.send();
          }
        }
        metaTimer = setTimeout(function () { pollMeta(false); }, fast ? 150 : 1500);
      }
    };
    metaXhr.onerror = function () { metaTimer = setTimeout(function () { pollMeta(false); }, 3000); };
    metaXhr.send();
  }

  var touchStartX = 0;
  var touchStartY = 0;
  var lastScroll  = 0;
  var SCROLL_MS   = 30;

  function streamCoords(clientX, clientY) {
    var r  = stream.getBoundingClientRect();
    var sc = W / r.width;
    console.log(
      "click",
      clientX,
      clientY,
      "rect",
      r.width,
      r.height,
      "W",
      W,
      "H",
      H
    );
    return {
      x: Math.round((clientX - r.left) * sc),
      y: Math.round((clientY - r.top)  * sc)
    };
  }

  if (isTouch) {
    stream.addEventListener("touchstart", function (e) {
      console.log("TOUCH START FIRED");
      input.blur();
      e.preventDefault();
      e.stopPropagation();
      if (menuOpen) { closeMenu(); return; }
      var t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, false);

    stream.addEventListener("touchmove", function (e) {
      e.preventDefault();
      if (menuOpen) return;
      var now = Date.now();
      if (now - lastScroll < SCROLL_MS) return;
      lastScroll = now;
      var t  = e.touches[0];
      var r  = stream.getBoundingClientRect();
      var sc = W / r.width;
      post("/input/scroll", {
        cid: cid,
        dx: (touchStartX - t.clientX) * sc,
        dy: (touchStartY - t.clientY) * sc
      });
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, false);

    function handleTap(clientX, clientY) {
      if (menuOpen) { closeMenu(); return; }

      var c = streamCoords(clientX, clientY);
      post("/input/tap", { cid: cid, x: c.x, y: c.y });
      pollMeta(true);
    }

    stream.onclick = function (e) {
      handleTap(e.clientX, e.clientY);
    };

    stream.addEventListener("touchend", function (e) {
      e.preventDefault();
      e.stopPropagation();

      var t = e.changedTouches[0];
      handleTap(t.clientX, t.clientY);

      return false;
    }, false);

    kbd.onchange = function () {
      alert("changed: " + kbd.value);

      if (kbd.value.length > 0) {
        post("/input/type", {
          cid: cid,
          text: kbd.value
        });

        kbd.value = "";
      }
    };

    kbd.onkeydown = function (e) {
      var code = e.keyCode || e.which;

      if (code === 13) {
        post("/input/key", { cid: cid, key: "Enter" });

        kbd.style.left = "-9999px";
        kbd.style.top = "-9999px";
        kbd.style.opacity = "0";
      }

      if (code === 8) post("/input/key", { cid: cid, key: "Backspace" });
    };

  } else {
    stream.onclick = function (e) {
      if (menuOpen) { closeMenu(); return; }
      var c = streamCoords(e.clientX, e.clientY);
      post("/input/tap", { cid: cid, x: c.x, y: c.y });
      kbd.focus();
      pollMeta(true);
    };

    var lastDelta = 0;

    function doScroll(dy) {
      if ((lastDelta > 0 && dy < 0) || (lastDelta < 0 && dy > 0)) {
        lastDelta = 0;
        return;
      }
      lastDelta = dy;
      post("/input/scroll", { cid: cid, dx: 0, dy: dy });
    }

    stream.onmousewheel = function (e) {
      if (menuOpen) return;
      var delta = e.wheelDelta ? -e.wheelDelta : (e.detail * 40);
      doScroll(delta * 0.8);
      if (e.preventDefault) e.preventDefault();
      return false;
    };

    stream.addEventListener("DOMMouseScroll", function (e) {
      if (menuOpen) return;
      doScroll(e.detail * 32);
      if (e.preventDefault) e.preventDefault();
    }, false);

    document.onkeydown = function (e) {
      if (document.activeElement === input) return;
      var code = e.keyCode || e.which;
      if (code === 8)  { post("/input/key", { cid: cid, key: "Backspace" }); if (e.preventDefault) e.preventDefault(); }
      if (code === 13) post("/input/key", { cid: cid, key: "Enter" });
      if (code === 37) post("/input/key", { cid: cid, key: "ArrowLeft" });
      if (code === 38) post("/input/key", { cid: cid, key: "ArrowUp" });
      if (code === 39) post("/input/key", { cid: cid, key: "ArrowRight" });
      if (code === 40) post("/input/key", { cid: cid, key: "ArrowDown" });
    };

    document.onkeypress = function (e) {
      if (document.activeElement === input) return;
      var code = e.keyCode || e.which || e.charCode;
      if (code < 32) return;
      post("/input/type", { cid: cid, text: String.fromCharCode(code) });
    };
  }

  startStream(currentUrl);
  pollMeta(false);

}());
</script>

</body>
</html>
